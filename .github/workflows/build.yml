name: Build Mod

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle and build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11-bin.zip
          unzip -q gradle-8.11-bin.zip
          ./gradle-8.11/bin/gradle build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: pearl-flash-hud
          path: build/libs/pearl-flash-hud-*.jar
